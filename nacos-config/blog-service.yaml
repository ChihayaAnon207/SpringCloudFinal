# CloudBlog blog-service Nacos Config
# 将此配置导入 Nacos 配置中心（Data ID: blog-service.yaml, Group: DEFAULT_GROUP）
# 可在 Nacos 控制台动态修改，无需重启服务

blog:
  default:
    page-size: 10          # 博客分页默认每页条数（后端默认值 10）

spring:
  datasource:
    url: jdbc:mysql://localhost:3307/springcloud_db?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password: Yx2474136983
    driver-class-name: com.mysql.cj.jdbc.Driver

  redis:
    host: localhost
    port: 6379
    timeout: 3000

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

feign:
  sentinel:
    enabled: true

sentinel:
  transport:
    dashboard: localhost:8858
    port: 8719
